<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - อนันทนาภร ต่อเชื้อ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            border-top: 8px solid #b39ddb; /* สีม่วงพาสเทลล้อกับโทนเสื้อผ้า */
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 20px;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            color: #4a148c;
            margin-bottom: 5px;
        }

        .student-id {
            font-size: 16px;
            color: #757575;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .info-section {
            text-align: left;
            background: #fdfbfe;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ede7f6;
        }

        .info-group {
            margin-bottom: 12px;
        }

        .info-group:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 13px;
            color: #9e9e9e;
            text-transform: uppercase;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }

        .value {
            font-size: 16px;
            color: #424242;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="IMG_20260618_151834.jpg" alt="รูปโปรไฟล์" class="profile-img">
        
        <div class="name">อนันทนาภร ต่อเชื้อ</div>
        <div class="student-id">รหัสนักศึกษา: 694245019</div>

        <div class="info-section">
            <div class="info-group">
                <span class="label">สาขาวิชา</span>
                <div class="value">วิทยาการคอมพิวเตอร์</div>
            </div>
            <div class="info-group">
                <span class="label">คณะ</span>
                <div class="value">วิทยาศาสตร์และเทคโนโลยี</div>
            </div>
            <div class="info-group">
                <span class="label">มหาวิทยาลัย</span>
                <div class="value">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</div>
            </div>
            <div class="info-group">
                <span class="label">เบอร์โทรศัพท์</span>
                <div class="value">0821313916</div>
            </div>
            <div class="info-group">
                <span class="label">อีเมล</span>
                <div class="value">694245019@mcru.ac.th</div>
            </div>
        </div>
    </div>

</body>
</html>
